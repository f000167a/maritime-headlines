name: 海事ニュース取得

on:
  schedule:
    # 平日 JST 7:00〜20:45 を15分間隔で実行
    # GitHub Actions cron は UTC（JST = UTC + 9）
    # JST 07:00 = UTC 22:00, JST 20:45 = UTC 11:45
    - cron: '0,15,30,45 22-23 * * 0-4'  # JST 07:00-08:45 (月-金)
    - cron: '0,15,30,45 0-11 * * 1-5'   # JST 09:00-20:45 (月-金)
  workflow_dispatch:  # 手動実行

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python maritime_headlines.py

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html seen_articles.json
          git diff --staged --quiet || git commit -m "Update $(date +%H:%M) JST"
          git pull --rebase origin main
          git push
